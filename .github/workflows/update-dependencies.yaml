name: Update Dependencies
on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  update-deps:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # develop branch
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
      # set up node
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
      # Make sure we have a clean Install First
      - name: Install Dependencies
        run: npm ci
      # Check if medium+ vulnerabilities exist (moderate, high, critical)
      - name: Check for Vulnerabilities
        id: audit
        run: |
          if npm audit --audit-level=moderate; then
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          fi
      # Only fix what can be resolved safely — manual review required for the rest
      - name: Fix Vulnerabilities
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        run: npm audit fix
      # Create a pull request to the develop branch
      - name: Create Pull Request
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependencies and fix vulnerabilities to develop branch"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: chore/update-deps-develop
          base: develop
          delete-branch: true
          title: "[Develop] chore: Update Dependencies & Fix Vulnerabilities"
          body: |
            Automated dependency update run by GitHub Actions targeting `develop`.

            Updates dependencies based on `npm audit fix`.
            Please review changes and ensure tests pass before merging into `develop`.
